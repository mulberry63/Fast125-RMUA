# Cost on states
Q_pos_xy:   200.0    # Cost for horizontal positon error //default: 200     0.5 
Q_pos_z:  200.0    # Cost for horizontal positon error //default: 200     0.5 
Q_attitude_rp:  50    # Cost for attitude error           //default: 50     0.1
Q_attitude_yaw:  50    # Cost for attitude error           //default: 50     0.1
Q_velocity:  1.0   # Cost for velocity error           //default: 10    0.05
#Q_bodyrate:  1.0  # Cost for bodyrate error            //default: 200    0.01

# Cost on Inputs
R_thrust:    1.0     # Cost on thrust input            //default: 1
R_pitchroll:  1     # Cost on pitch and roll rate
R_yaw:        1     # Cost on yaw ratte

# Exponential scaling: W_i = W * exp(-i/N * cost_scaling).
# cost_scaling = 0 means no scaling W_i = W. 
state_cost_exponential: 0.0     # Scaling for state costs
input_cost_exponential: 0.0     # scaling for input costs

# Limits for inputs
max_bodyrate_xy:    10.0       # ~ pi [rad/s]
max_bodyrate_z:     3.0         # ~ pi*2/3 [rad/s]
min_thrust:         1.0       # ~ 20% gravity [N] / 4 for single rotor!
max_thrust:         16.7      # ~ 200% gravity [N] / 4   for single rotor!

# Print information such as timing to terminal
print_info:       true

# Vehicle parameters
inertia_x: 0.012861
inertia_y: 0.009479
inertia_z: 0.009726
arm_length: 0.165
mass: 1.0
# Motors parameters
rotor_drag_coeff: 0.012495
rotor_thrust_coeff: 4.141e-08
# max_rotor_speed: 838.0
# # Controller
# low_level_control_frequency: 200.0
# body_rates_p_xy: 0.1
# body_rates_d_xy: 0.5
# body_rates_p_z: 0.03
# body_rates_d_z: 0.1
# roll_pitch_cont_gain: 6.0

# control fsm param
ctrl_freq_max: 100.0
takeoff_height: 1.6
start_land_velocity: 0.5
start_land_acceleration: 0.5
traj_rcv_timeout: 0.5

# control fsm param for real-world experiments
use_bodyrate_ctrl: true
use_thrust_ctrl: false
max_manual_vel: 1.0
max_angle: 30  # Attitude angle limit in degree. A negative value means no limit.
low_voltage: 13.2 # 4S battery

auto_takeoff_land:
    enable: true
    enable_auto_arm: true
    no_RC: false
    takeoff_height: 1.0 # m
    takeoff_land_speed: 0.3 # m/s

thrust_model: # The model that maps thrust signal u(0~1) to real thrust force F(Unit:N): F=K1*Voltage^K2*(K3*u^2+(1-K3)*u). 
    print_value: false # display the value of “thr_scale_compensate” or “hover_percentage” during thrust model estimating.
    accurate_thrust_model: false  # This can always enabled if don't require accurate control performance :-)
    # accurate thrust mapping parameters
    K1: 0.7583 # Needs precise calibration!
    K2: 1.6942 # Needs precise calibration!
    K3: 0.6786 # Needs precise calibration! K3 equals THR_MDL_FAC in https://docs.px4.io/master/en/config_mc/pid_tuning_guide_multicopter.html.
    # approximate thrust mapping parameters
    hover_percentage: 0.5935  # Thrust percentage in Stabilize/Arco mode # *

gain: 
    # Cascade PID controller. Recommend to read the code.
    Kp0: 2.1
    Kp1: 2.1
    Kp2: 2.1
    Kv0: 2.1
    Kv1: 2.1
    Kv2: 2.1
    # ↓↓↓ No use now --
    Kvi0: 0.0
    Kvi1: 0.0
    Kvi2: 0.0
    Kvd0: 0.0
    Kvd1: 0.0
    Kvd2: 0.0
    # ↓↓↓ Only used in rate control mode.
    KAngR: 20.0
    KAngP: 20.0
    KAngY: 20.0

rotor_drag:  
    x: 0.0  # The reduced acceleration on each axis caused by rotor drag. Unit:(m*s^-2)/(m*s^-1).
    y: 0.0  # Same as above
    z: 0.0  # Same as above
    k_thrust_horz: 0.0 # Set to 0 recommended... --

msg_timeout:
    odom: 0.5
    rc:   0.5
    cmd:  0.5
    imu:  0.5
    bat:  0.5

# state predictor
control_command_delay: 0.05
